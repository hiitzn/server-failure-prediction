services:

  agent: 
    build: ./agent     
    restart: unless-stopped
    environment:
      LISTEN_ADDR:     ":9100"
      SCRAPE_INTERVAL: "15s"
      DISK_PATH:       "/"
      LOG_LEVEL:       "info"
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - agent

volumes:
  prometheus_data:
