name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go-checks:
    name: Go agent – test & security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent/go.sum

      - name: Download dependencies
        run: go mod tidy && go mod download

      - name: Run tests with coverage
        run: go test ./... -cover

      - name: Install gosec (SAST)
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec ./...
        continue-on-error: true   

      - name: Install govulncheck (SCA)
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true

  python-checks:
    name: Python ML service – test & security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml_service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest tests/ --cov=app --cov-report=term

      - name: Install bandit (SAST)
        run: pip install bandit

      - name: Run bandit
        run: bandit -r app/ -ll
        continue-on-error: true

      - name: Install pip-audit (SCA)
        run: pip install pip-audit

      - name: Check dependencies for vulnerabilities
        run: pip-audit -r requirements.txt
        continue-on-error: true